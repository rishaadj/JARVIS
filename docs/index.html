<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS | Autonomous Multi-Agent Core</title>
    <meta name="description"
        content="A Stark-level autonomous AI assistant built with Python 3.14 and Ollama. Developed by Rishaadj.">

    <meta name="google-site-verification" content="auHwd7tUHXW0Yy-gXWuSMIelJ4LDXUI9ID1_xFdB4G0" />

    <style>
        :root {
            --bg: #0a0a0b;
            --text: #e0e0e0;
            --accent: #00d4ff;
            --secondary: #1a1a1c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: var(--secondary);
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #aaa;
        }

        .status-box {
            display: inline-block;
            padding: 8px 15px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            border-radius: 4px;
            color: var(--accent);
            font-family: 'Courier New', Courier, monospace;
            margin: 20px 0;
            font-size: 0.9rem;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background-color: var(--accent);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
        }

        .footer-links {
            margin-top: 40px;
            font-size: 0.8rem;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer-links a:hover {
            color: var(--accent);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>JARVIS CORE</h1>
        <div class="status-box">SYSTEM STATUS: ONLINE // VERSION: 3.14.3</div>

        <p>A sophisticated autonomous multi-agent orchestration framework.
            Designed for high-fidelity reasoning, vision-awareness, and seamless
            human-AI collaboration.</p>

        <a href="https://github.com/rishaadj/JARVIS" class="btn">ACCESS SOURCE CODE</a>
    </div>

</body>

</html>
